<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="せどり計算">
<meta name="theme-color" content="#6ee7b7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>せどり利益計算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #6ee7b7;
    --warn: #fbbf24;
    --danger: #f87171;
    --text: #f1f1f5;
    --muted: #6b6b80;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 0 0 40px;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 430px;
    padding: 0 16px;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    padding: 52px 0 20px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* インストールバナー */
  .install-banner {
    background: linear-gradient(135deg, #1a3a2e, #1a2230);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    display: none;
  }

  .install-banner.show { display: flex; }

  .install-banner p { font-size: 12px; color: var(--accent); font-weight: 500; flex: 1; }
  .install-banner span { font-size: 18px; }

  /* カード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }

  .input-row:last-child { border-bottom: none; }

  .input-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }

  .input-label span {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }

  .input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  .input-wrap input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    width: 96px;
    text-align: right;
    padding: 9px 6px 9px 10px;
  }

  .input-unit {
    font-size: 13px;
    color: var(--muted);
    padding-right: 10px;
    font-family: 'DM Mono', monospace;
  }

  /* 判定 */
  .judge-card {
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid transparent;
    transition: all 0.3s;
  }

  .judge-card.buy        { background: #0f2a1e; border-color: var(--accent); }
  .judge-card.conditional{ background: #2a1f0a; border-color: var(--warn); }
  .judge-card.pass       { background: #2a0f0f; border-color: var(--danger); }
  .judge-card.neutral    { background: var(--surface); border-color: var(--border); }

  .judge-icon { font-size: 26px; flex-shrink: 0; }

  .judge-text strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .judge-text p { font-size: 11px; color: var(--muted); line-height: 1.5; }

  .judge-card.buy .judge-text strong         { color: var(--accent); }
  .judge-card.conditional .judge-text strong { color: var(--warn); }
  .judge-card.pass .judge-text strong        { color: var(--danger); }
  .judge-card.neutral .judge-text strong     { color: var(--muted); }

  /* 結果 */
  .results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }

  .result-header {
    background: linear-gradient(135deg, #1a3a2e, #1a2230);
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
  }

  .result-header p {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .result-item {
    background: var(--surface);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .result-item.full {
    grid-column: 1 / -1;
    background: var(--surface2);
  }

  .result-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; }

  .result-value {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    transition: color 0.3s;
  }

  .result-item.full .result-value { font-size: 26px; }

  .result-value.positive { color: var(--accent); }
  .result-value.warning  { color: var(--warn); }
  .result-value.negative { color: var(--danger); }

  /* ゲージ */
  .gauge-section { padding: 14px 18px; border-top: 1px solid var(--border); }

  .gauge-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .gauge-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .gauge-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
  }

  /* タグ */
  .criteria { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  .criteria-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 700;
  }

  .criteria-tag.ok   { background: #0f2a1e; color: var(--accent); border: 1px solid var(--accent); }
  .criteria-tag.ng   { background: #2a0f0f; color: var(--danger); border: 1px solid var(--danger); }
  .criteria-tag.warn { background: #2a1f0a; color: var(--warn);   border: 1px solid var(--warn); }

  /* ボタン */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
    letter-spacing: 0.3px;
  }

  .btn-primary  { background: linear-gradient(135deg, var(--accent), #34d399); color: #0f2a1e; }
  .btn-secondary{ background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn:active   { transform: scale(0.96); }

  /* iOS safari下部余白 */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    body { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>せどり 利益計算</h1>
    <p>メルカリ販売 / ROI・利益率チェック</p>
  </div>

  <!-- インストール促進バナー（Android Chrome用） -->
  <div class="install-banner" id="installBanner">
    <span>📲</span>
    <p>ホーム画面に追加してアプリとして使う</p>
    <span>→</span>
  </div>

  <!-- 入力 -->
  <div class="card">
    <div class="card-title">入力項目</div>
    <div class="input-row">
      <div class="input-label">販売価格<span>メルカリ売値</span></div>
      <div class="input-wrap">
        <input type="number" id="price" placeholder="0" inputmode="numeric">
        <span class="input-unit">円</span>
      </div>
    </div>
    <div class="input-row">
      <div class="input-label">仕入れ値<span>原価</span></div>
      <div class="input-wrap">
        <input type="number" id="cost" placeholder="0" inputmode="numeric">
        <span class="input-unit">円</span>
      </div>
    </div>
    <div class="input-row">
      <div class="input-label">配送料<span>発送コスト</span></div>
      <div class="input-wrap">
        <input type="number" id="shipping" placeholder="700" inputmode="numeric">
        <span class="input-unit">円</span>
      </div>
    </div>
    <div class="input-row">
      <div class="input-label">メルカリ手数料<span>通常10%</span></div>
      <div class="input-wrap">
        <input type="number" id="fee" placeholder="10" inputmode="numeric" max="100">
        <span class="input-unit">%</span>
      </div>
    </div>
  </div>

  <!-- 判定 -->
  <div id="judgeCard" class="judge-card neutral">
    <div class="judge-icon" id="judgeIcon">📦</div>
    <div class="judge-text">
      <strong id="judgeLabel">数字を入力してください</strong>
      <p id="judgeDesc">販売価格と仕入れ値を入力すると判定します</p>
    </div>
  </div>

  <!-- 結果 -->
  <div class="results">
    <div class="result-header"><p>計算結果</p></div>
    <div class="result-grid">
      <div class="result-item full">
        <div class="result-label">粗利（手取り利益）</div>
        <div class="result-value" id="profit">— 円</div>
        <div class="criteria" id="profitCriteria"></div>
      </div>
      <div class="result-item">
        <div class="result-label">利益率</div>
        <div class="result-value" id="margin">— %</div>
      </div>
      <div class="result-item">
        <div class="result-label">ROI</div>
        <div class="result-value" id="roi">— %</div>
      </div>
    </div>
    <div class="gauge-section">
      <div class="gauge-label"><span>ROIゲージ</span><span>理想：50%以上</span></div>
      <div class="gauge-track"><div class="gauge-fill" id="roiGauge"></div></div>
      <div class="gauge-label"><span>利益率ゲージ</span><span>理想：40%以上</span></div>
      <div class="gauge-track"><div class="gauge-fill" id="marginGauge"></div></div>
    </div>
  </div>

  <!-- ボタン -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="calculate()">計算する</button>
    <button class="btn btn-secondary" onclick="clearAll()">クリア</button>
  </div>

</div>

<script>
  // PWA Service Worker登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Android Chrome インストールプロンプト
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.add('show');
  });

  document.getElementById('installBanner').addEventListener('click', () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        document.getElementById('installBanner').classList.remove('show');
        deferredPrompt = null;
      });
    }
  });

  // リアルタイム計算
  document.querySelectorAll('input').forEach(el => el.addEventListener('input', calculate));

  // 初期値
  document.getElementById('shipping').value = 700;
  document.getElementById('fee').value = 10;

  function calculate() {
    const price    = parseFloat(document.getElementById('price').value) || 0;
    const cost     = parseFloat(document.getElementById('cost').value) || 0;
    const shipping = parseFloat(document.getElementById('shipping').value) || 0;
    const feeRate  = parseFloat(document.getElementById('fee').value) || 10;

    if (price === 0 && cost === 0) { resetResults(); return; }

    const feeCost = price * (feeRate / 100);
    const profit  = price - cost - shipping - feeCost;
    const margin  = price > 0 ? (profit / price) * 100 : 0;
    const roi     = cost  > 0 ? (profit / cost)  * 100 : 0;

    document.getElementById('profit').textContent = formatYen(profit);
    document.getElementById('margin').textContent = margin.toFixed(1) + '%';
    document.getElementById('roi').textContent    = roi.toFixed(1) + '%';

    setColor(document.getElementById('profit'), profit, 3000, 5000);
    setColor(document.getElementById('margin'), margin, 25, 40);
    setColor(document.getElementById('roi'),    roi,    30, 50);

    updateGauge('roiGauge',    roi,    100);
    updateGauge('marginGauge', margin, 60);

    const criteria = document.getElementById('profitCriteria');
    criteria.innerHTML = '';
    addTag(criteria, profit >= 3000, profit >= 5000, '粗利', formatYen(profit));
    addTag(criteria, roi >= 30,      roi >= 50,      'ROI',  roi.toFixed(0) + '%');
    addTag(criteria, margin >= 25,   margin >= 40,   '利益率', margin.toFixed(0) + '%');

    updateJudge(profit, roi, margin);
  }

  function formatYen(v) {
    return (v >= 0 ? '' : '-') + Math.abs(Math.round(v)).toLocaleString() + '円';
  }

  function setColor(el, val, min, ideal) {
    el.classList.remove('positive', 'warning', 'negative');
    if (val >= ideal) el.classList.add('positive');
    else if (val >= min) el.classList.add('warning');
    else el.classList.add('negative');
  }

  function updateGauge(id, val, max) {
    const el = document.getElementById(id);
    el.style.width = Math.min(Math.max(val / max * 100, 0), 100) + '%';
    el.style.background = val >= 50
      ? 'linear-gradient(90deg,#6ee7b7,#34d399)'
      : val >= 30
      ? 'linear-gradient(90deg,#fbbf24,#f59e0b)'
      : 'linear-gradient(90deg,#f87171,#ef4444)';
  }

  function addTag(container, ok, ideal, label, val) {
    const tag = document.createElement('span');
    tag.className = 'criteria-tag ' + (ideal ? 'ok' : ok ? 'warn' : 'ng');
    tag.textContent = label + ' ' + val;
    container.appendChild(tag);
  }

  function updateJudge(profit, roi, margin) {
    const card  = document.getElementById('judgeCard');
    const icon  = document.getElementById('judgeIcon');
    const label = document.getElementById('judgeLabel');
    const desc  = document.getElementById('judgeDesc');

    card.className = 'judge-card';

    if (profit >= 5000 && roi >= 50) {
      card.classList.add('buy');
      icon.textContent  = '🟢';
      label.textContent = '積極仕入れ';
      desc.textContent  = `粗利${formatYen(profit)}・ROI${roi.toFixed(0)}%。迷わず仕入れ。`;
    } else if (profit >= 3000 && roi >= 30) {
      card.classList.add('buy');
      icon.textContent  = '✅';
      label.textContent = '仕入れOK';
      desc.textContent  = `最低基準クリア。回転30日以内なら問題なし。`;
    } else if (profit >= 1500 && roi >= 20) {
      card.classList.add('conditional');
      icon.textContent  = '⚠️';
      label.textContent = '条件付き仕入れ';
      desc.textContent  = `薄利。梱包が楽・回転が早い場合のみ検討。`;
    } else if (profit < 0) {
      card.classList.add('pass');
      icon.textContent  = '❌';
      label.textContent = '赤字 — 絶対見送り';
      desc.textContent  = `売値を上げるか仕入れ値を下げないと赤字です。`;
    } else {
      card.classList.add('pass');
      icon.textContent  = '🔴';
      label.textContent = '見送り';
      desc.textContent  = `基準未達。この価格では仕入れない。`;
    }
  }

  function resetResults() {
    ['profit','margin','roi'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = id === 'profit' ? '— 円' : '— %';
      el.classList.remove('positive','warning','negative');
    });
    document.getElementById('roiGauge').style.width = '0%';
    document.getElementById('marginGauge').style.width = '0%';
    document.getElementById('profitCriteria').innerHTML = '';
    document.getElementById('judgeCard').className = 'judge-card neutral';
    document.getElementById('judgeIcon').textContent  = '📦';
    document.getElementById('judgeLabel').textContent = '数字を入力してください';
    document.getElementById('judgeDesc').textContent  = '販売価格と仕入れ値を入力すると判定します';
  }

  function clearAll() {
    document.getElementById('price').value    = '';
    document.getElementById('cost').value     = '';
    document.getElementById('shipping').value = 700;
    document.getElementById('fee').value      = 10;
    resetResults();
  }
</script>
</body>
</html>
